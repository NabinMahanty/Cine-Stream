<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Mood Matcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-container">
        <a href="#/" class="nav-logo">
          <span class="logo-icon">🎬</span>
          <span class="logo-text">MoodMatch</span>
        </a>
        <div class="nav-links">
          <a href="#/" class="nav-link active" data-route="home">Home</a>
          <a href="#/favorites" class="nav-link" data-route="favorites"
            >❤️ Favorites</a
          >
        </div>
      </div>
    </nav>

    <!-- Hero / Search Section -->
    <header class="hero">
      <div class="hero-container">
        <h1 class="hero-title">Discover Your Next Favorite Movie</h1>
        <p class="hero-subtitle">Search thousands of movies</p>

        <!-- Search Bar -->
        <div class="search-wrapper">
          <div class="search-bar">
            <svg
              class="search-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            <input
              type="text"
              id="search-input"
              class="search-input"
              placeholder="Search for movies..."
              autocomplete="off"
            />
            <button
              id="clear-search"
              class="clear-btn hidden"
              title="Clear search"
            >
              ✕
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <div class="container">
        <!-- Section Title -->
        <div class="section-header" id="section-header">
          <h2 class="section-title" id="section-title">Popular Movies</h2>
          <span class="section-badge" id="section-badge"></span>
        </div>

        <!-- Movie Grid -->
        <div class="movie-grid" id="movie-grid"></div>

        <!-- Loading Spinner -->
        <div class="loader hidden" id="loader">
          <div class="spinner"></div>
          <p>Loading movies...</p>
        </div>

        <!-- Sentinel for Infinite Scroll -->
        <div id="scroll-sentinel" class="scroll-sentinel"></div>

        <!-- Empty State -->
        <div class="empty-state hidden" id="empty-state">
          <span class="empty-icon">🎥</span>
          <h3>No movies found</h3>
          <p>Try a different search or explore popular movies.</p>
        </div>
      </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <!-- Movie Details Modal -->
    <div id="movie-modal" class="movie-modal hidden" aria-hidden="true">
      <div class="movie-modal-backdrop" data-close-modal></div>
      <div
        class="movie-modal-content"
        role="dialog"
        aria-modal="true"
        aria-labelledby="movie-modal-title"
      >
        <button
          class="movie-modal-close"
          id="movie-modal-close"
          aria-label="Close movie details"
        >
          ✕
        </button>
        <div id="movie-modal-body" class="movie-modal-body"></div>
      </div>
    </div>

    <footer class="footer">
      <p>
        Powered by
        <a href="https://www.themoviedb.org/" target="_blank" rel="noopener"
          >TMDB</a
        >
      </p>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
